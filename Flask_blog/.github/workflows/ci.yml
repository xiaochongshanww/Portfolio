name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install flake8 black isort
      - run: black --check backend/
      - name: flake8
        run: flake8 backend/ --exit-zero
      - run: isort --check-only backend/ --diff || true

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run lint

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt pytest-cov
      - name: Run tests (SQLite in-memory + FakeRedis)
        working-directory: backend
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=30

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run test
      - working-directory: frontend
        run: npm run build --if-present

  lhci:
    needs: [test-backend, test-frontend]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - working-directory: frontend
        run: npm ci && npm run build
      - name: Start servers
        run: |
          nohup python backend/run.py &
          npx serve -s frontend/dist -l 5173 &
          sleep 6
      - name: Lighthouse CI
        run: npx lhci autorun || echo "Lighthouse warnings (non-blocking)"
