name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install flake8 black isort
      - run: black --check backend/
      - name: flake8
        run: flake8 backend/ --exit-zero
      - run: isort --check-only backend/ --diff || true

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run lint

  test-backend:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: blog
        ports: ["3306:3306"]
        options: >-
          --health-cmd="mysqladmin ping -h localhost" --health-interval=10s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then break; fi; sleep 2; done
      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: mysql+pymysql://root:root@127.0.0.1:3306/blog
        run: flask db upgrade
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: mysql+pymysql://root:root@127.0.0.1:3306/blog
          REDIS_URL: redis://127.0.0.1:6379/0
        run: pytest -q --tb=short

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run test
      - working-directory: frontend
        run: npm run build --if-present

  lhci:
    needs: [test-backend, test-frontend]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - working-directory: frontend
        run: npm ci && npm run build
      - name: Start servers
        run: |
          nohup python backend/run.py &
          npx serve -s frontend/dist -l 5173 &
          sleep 6
      - name: Lighthouse CI
        run: npx lhci autorun || echo "Lighthouse warnings (non-blocking)"
