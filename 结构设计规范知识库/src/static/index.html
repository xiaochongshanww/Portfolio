<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>结构设计规范知识库</title>
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
header { background: #16213e; padding: 16px 24px; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 18px; font-weight: 600; color: #e94560; }
header .subtitle { font-size: 13px; color: #888; }
#chat { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
.msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; }
.msg.user { background: #0f3460; align-self: flex-end; border-bottom-right-radius: 4px; }
.msg.assistant { background: #16213e; align-self: flex-start; border-bottom-left-radius: 4px; }
.msg.assistant p { margin-bottom: 8px; }
.msg.assistant ul, .msg.assistant ol { padding-left: 20px; margin-bottom: 8px; }
.msg.assistant table { border-collapse: collapse; margin: 8px 0; font-size: 13px; width: 100%; }
.msg.assistant th, .msg.assistant td { border: 1px solid #0f3460; padding: 6px 10px; text-align: left; }
.msg.assistant th { background: #0f3460; }
.msg.assistant code { background: #0a0a1a; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
.msg.assistant pre { background: #0a0a1a; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
.msg .sources { font-size: 12px; color: #888; margin-top: 8px; border-top: 1px solid #0f3460; padding-top: 8px; }
.msg .sources span { display: inline-block; background: #0f3460; padding: 2px 8px; border-radius: 4px; margin: 2px 4px 2px 0; font-size: 11px; }
.thinking { color: #888; font-style: italic; font-size: 13px; padding: 4px 16px; }
#input-area { padding: 16px 24px; background: #16213e; border-top: 1px solid #0f3460; display: flex; gap: 12px; }
#input { flex: 1; background: #0a0a1a; border: 1px solid #0f3460; border-radius: 8px; padding: 12px 16px; color: #e0e0e0; font-size: 14px; outline: none; }
#input:focus { border-color: #e94560; }
#send { background: #e94560; color: #fff; border: none; border-radius: 8px; padding: 12px 24px; font-size: 14px; cursor: pointer; transition: opacity .2s; }
#send:hover { opacity: .85; }
#send:disabled { opacity: .4; cursor: not-allowed; }
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; gap: 12px; }
.empty-state svg { width: 64px; height: 64px; opacity: .3; }
.empty-state p { font-size: 14px; }
@media (max-width: 640px) { .msg { max-width: 95%; } #chat { padding: 12px; } #input-area { padding: 12px; } }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
.loading-dots span { animation: pulse 1.4s infinite; font-size: 24px; line-height: 1; }
.loading-dots span:nth-child(2) { animation-delay: .2s; }
.loading-dots span:nth-child(3) { animation-delay: .4s; }
</style>
</head>
<body>

<header>
  <h1>🏗️ 结构设计规范知识库</h1>
  <span class="subtitle">RAG · DeepSeek · 5本规范</span>
</header>

<div id="chat">
  <div class="empty-state" id="emptyState">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    <p>输入结构设计规范相关的问题开始查询</p>
  </div>
</div>

<div id="input-area">
  <input id="input" type="text" placeholder="例如：抗震等级如何划分？" autofocus>
  <button id="send" onclick="send()">发送</button>
</div>

<script>
const API = '/v1/chat/completions';
let loading = false;

document.getElementById('input').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });

function addMsg(role, content) {
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (role === 'assistant') div.innerHTML = marked.parse(content);
  else div.textContent = content;
  document.getElementById('chat').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
  return div;
}

function addLoading() {
  const div = document.createElement('div');
  div.className = 'msg assistant loading-dots';
  div.innerHTML = '<span>.</span><span>.</span><span>.</span>';
  div.id = 'loading';
  document.getElementById('chat').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

function removeLoading() {
  const el = document.getElementById('loading');
  if (el) el.remove();
}

async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || loading) return;
  input.value = '';
  loading = true;
  document.getElementById('send').disabled = true;

  addMsg('user', text);
  addLoading();

  try {
    const resp = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'user', content: text }], stream: true })
    });

    if (!resp.ok) { removeLoading(); addMsg('assistant', '请求失败: ' + resp.status); loading = false; document.getElementById('send').disabled = false; return; }

    removeLoading();
    const msgDiv = addMsg('assistant', '');
    let content = '';
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || trimmed === 'data: [DONE]') continue;
        if (!trimmed.startsWith('data: ')) continue;
        try {
          const chunk = JSON.parse(trimmed.slice(6));
          const token = chunk.choices?.[0]?.delta?.content || '';
          if (token) { content += token; msgDiv.innerHTML = marked.parse(content); }
        } catch(e) {}
      }
    }
  } catch(e) {
    removeLoading();
    addMsg('assistant', '连接错误: ' + e.message);
  }
  loading = false;
  document.getElementById('send').disabled = false;
}
</script>
</body>
</html>
